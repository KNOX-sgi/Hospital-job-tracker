<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>병원 임상병리사 채용공고 트래커</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 24px 16px 12px;
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 16px 40px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .hospital {
      font-size: 13px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .status {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #dcfce7;
      color: var(--ok);
    }

    .meta {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.5;
    }

    .label {
      color: var(--muted);
    }

    .positions {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .position {
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
      font-size: 14px;
      line-height: 1.5;
    }

    .position:last-child {
      border-bottom: 0;
    }

    a.button {
      display: inline-block;
      margin-top: 14px;
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 10px 13px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .empty {
      background: white;
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 21px;
      }

      .card-top {
        display: block;
      }

      .status {
        display: inline-block;
        margin-top: 10px;
      }

      .meta {
        grid-template-columns: 76px 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>병원 임상병리사 채용공고 트래커</h1>
    <div class="subtitle">
      각 병원 채용 홈페이지에서 임상병리사 관련 계약직·정규직 공고를 자동 수집해 보여줍니다.
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="pill" id="updatedAt">업데이트 확인 중</div>
      <div class="pill" id="totalCount">공고 0건</div>
    </div>

    <section id="app">
      <div class="empty">채용 정보를 불러오는 중입니다.</div>
    </section>
  </main>

  <script>
    const app = document.getElementById("app");
    const updatedAt = document.getElementById("updatedAt");
    const totalCount = document.getElementById("totalCount");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderEmpty(data) {
      const snuhError = data?.errors?.snuh;

      app.innerHTML = `
        <div class="empty">
          현재 조건에 맞는 진행 중 공고가 없습니다.<br>
          <small>서울대학교병원 기준: 지정 제목 + 진행상황 공고 + 촉탁보건직 + 진단검사의학과/병리과 + 임상병리사</small>
          ${snuhError ? `<div class="error">서울대학교병원 수집 오류: ${escapeHtml(snuhError)}</div>` : ""}
        </div>
      `;
    }

    function renderJobs(data) {
      const jobs = data.jobs || [];

      updatedAt.textContent = data.updated_at
        ? `최근 업데이트: ${data.updated_at}`
        : "최근 업데이트: 없음";

      totalCount.textContent = `공고 ${jobs.length}건`;

      if (!jobs.length) {
        renderEmpty(data);
        return;
      }

      app.innerHTML = jobs.map(job => {
        const positions = (job.positions || []).map(pos => `
          <div class="position">
            <strong>${escapeHtml(pos.department)}</strong><br>
            고용형태: ${escapeHtml(pos.employment_type)}<br>
            채용인원: ${escapeHtml(pos.headcount || "-")}<br>
            지원자격: ${escapeHtml(pos.qualification || "-")}<br>
            계약기간: ${escapeHtml(pos.contract_period || "-")}
          </div>
        `).join("");

        return `
          <article class="card">
            <div class="card-top">
              <div>
                <div class="hospital">${escapeHtml(job.hospital)}</div>
                <div class="title">${escapeHtml(job.title)}</div>
              </div>
              <div class="status">${escapeHtml(job.status)}</div>
            </div>

            <div class="meta">
              <div class="label">모집기간</div>
              <div>${escapeHtml(job.application_period || "-")}</div>

              <div class="label">구분</div>
              <div>${escapeHtml(job.career_type || "-")}</div>

              <div class="label">수집시각</div>
              <div>${escapeHtml(job.scraped_at || "-")}</div>
            </div>

            <div class="positions">
              ${positions}
            </div>

            <a class="button" href="${escapeHtml(job.detail_url)}" target="_blank" rel="noopener noreferrer">
              원문 공고 보기
            </a>
          </article>
        `;
      }).join("");
    }

    async function loadJobs() {
      try {
        const response = await fetch(`jobs.json?ts=${Date.now()}`);
        if (!response.ok) {
          throw new Error(`jobs.json 로드 실패: ${response.status}`);
        }

        const data = await response.json();
        renderJobs(data);
      } catch (error) {
        updatedAt.textContent = "업데이트 확인 실패";
        app.innerHTML = `
          <div class="empty">
            데이터를 불러오지 못했습니다.
            <div class="error">${escapeHtml(error.message)}</div>
          </div>
        `;
      }
    }

    loadJobs();
  </script>
</body>
</html>
